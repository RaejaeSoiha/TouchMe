name: touch_me
description: TouchMe — find people nearby, add friends, and chat.
publish_to: none
version: 1.0.0+1
environment:
  sdk: ">=3.8.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.4.1
  dio: ^5.9.2
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.0
  flutter_riverpod: ^3.3.2
  flutter_secure_storage: ^10.3.1
  flutter_webrtc: ^1.2.1
  geolocator: ^14.0.3
  go_router: ^17.3.0
  google_sign_in: ^7.2.0
  image_picker: ^1.2.2
  just_audio: ^0.10.5
  path_provider: ^2.1.6
  record: ^7.1.0
  shared_preferences: ^2.5.3
  sign_in_with_apple: ^8.1.0
  socket_io_client: ^3.1.6
  url_launcher: ^6.3.2
  uuid: ^4.5.3
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
flutter:
  uses-material-design: true
