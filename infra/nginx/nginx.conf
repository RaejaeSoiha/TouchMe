worker_processes auto;
events { worker_connections 2048; }
http {
  limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
  limit_req_status 429;
  upstream api { server api:3000; }
  upstream admin { server admin:3001; }
  server {
    listen 80;
    client_max_body_size 2m;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    location /admin-api/ { proxy_pass http://admin; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /api/ { limit_req zone=api burst=40 nodelay; proxy_pass http://api; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
    location /socket.io/ { proxy_pass http://api; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $host; }
    location /docs { proxy_pass http://api; proxy_set_header Host $host; }
    location / { proxy_pass http://admin; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
  }
}
